<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 200" font-family="Arial, sans-serif">
  <!-- Cảm biến siêu âm HC-SR04 - realistic front view -->

  <!-- PCB Board - teal/dark blue -->
  <rect x="10" y="15" width="240" height="120" rx="6" fill="#1B5E7B" stroke="#134B62" stroke-width="2.5"/>

  <!-- 4 lỗ bắt vít ở 4 góc -->
  <circle cx="22" cy="27" r="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <circle cx="238" cy="27" r="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <circle cx="22" cy="123" r="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <circle cx="238" cy="123" r="5" fill="#ccc" stroke="#aaa" stroke-width="1"/>

  <!-- Crystal oscillator (oval, giữa trên) -->
  <ellipse cx="130" cy="35" rx="22" ry="10" fill="#bbb" stroke="#999" stroke-width="1.5"/>
  <ellipse cx="130" cy="35" rx="18" ry="7" fill="#ccc"/>

  <!-- ===== Mắt siêu âm trái (Transmitter) ===== -->
  <g transform="translate(70, 75)">
    <!-- Vòng ngoài bạc -->
    <circle cx="0" cy="0" r="38" fill="#ccc" stroke="#aaa" stroke-width="2"/>
    <!-- Vòng xám đậm -->
    <circle cx="0" cy="0" r="33" fill="#888" stroke="#777" stroke-width="1.5"/>
    <!-- Vòng vàng (piezo element) -->
    <circle cx="0" cy="0" r="26" fill="#D4C84A" stroke="#B8AD3E" stroke-width="2"/>
    <!-- Tâm bạc -->
    <circle cx="0" cy="0" r="18" fill="#bbb" stroke="#999" stroke-width="1"/>
    <!-- Highlight phản chiếu -->
    <ellipse cx="-6" cy="-8" rx="8" ry="5" fill="white" opacity="0.2"/>
  </g>

  <!-- ===== Mắt siêu âm phải (Receiver) ===== -->
  <g transform="translate(190, 75)">
    <!-- Vòng ngoài bạc -->
    <circle cx="0" cy="0" r="38" fill="#ccc" stroke="#aaa" stroke-width="2"/>
    <!-- Vòng xám đậm -->
    <circle cx="0" cy="0" r="33" fill="#888" stroke="#777" stroke-width="1.5"/>
    <!-- Vòng vàng (piezo element) -->
    <circle cx="0" cy="0" r="26" fill="#D4C84A" stroke="#B8AD3E" stroke-width="2"/>
    <!-- Tâm bạc -->
    <circle cx="0" cy="0" r="18" fill="#bbb" stroke="#999" stroke-width="1"/>
    <!-- Highlight phản chiếu -->
    <ellipse cx="-6" cy="-8" rx="8" ry="5" fill="white" opacity="0.2"/>
  </g>

  <!-- ===== 4 chân pin (dưới board) ===== -->
  <!-- Pin holes on board -->
  <ellipse cx="95" cy="125" rx="5" ry="4" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="115" cy="125" rx="5" ry="4" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="140" cy="125" rx="5" ry="4" fill="#bbb" stroke="#999" stroke-width="1"/>
  <ellipse cx="160" cy="125" rx="5" ry="4" fill="#bbb" stroke="#999" stroke-width="1"/>

  <!-- Pin wires extending down -->
  <rect x="93" y="130" width="4" height="50" rx="1" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="113" y="130" width="4" height="50" rx="1" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="138" y="130" width="4" height="50" rx="1" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <rect x="158" y="130" width="4" height="50" rx="1" fill="#bbb" stroke="#999" stroke-width="0.5"/>

  <!-- Pin labels on board -->
  <text x="95" y="120" text-anchor="middle" font-size="7" fill="#D6EAF8" font-weight="bold">VCC</text>
  <text x="115" y="120" text-anchor="middle" font-size="7" fill="#D6EAF8" font-weight="bold">TRIG</text>
  <text x="140" y="120" text-anchor="middle" font-size="7" fill="#D6EAF8" font-weight="bold">ECHO</text>
  <text x="160" y="120" text-anchor="middle" font-size="7" fill="#D6EAF8" font-weight="bold">GND</text>

  <!-- Pin labels below pins -->
  <text x="95" y="192" text-anchor="middle" font-size="8" fill="#E74C3C" font-weight="bold">VCC</text>
  <text x="115" y="192" text-anchor="middle" font-size="8" fill="#3498DB" font-weight="bold">Trig</text>
  <text x="140" y="192" text-anchor="middle" font-size="8" fill="#F39C12" font-weight="bold">Echo</text>
  <text x="160" y="192" text-anchor="middle" font-size="8" fill="#2C3E50" font-weight="bold">GND</text>
</svg>