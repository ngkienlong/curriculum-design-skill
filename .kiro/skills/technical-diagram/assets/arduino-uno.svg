<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" font-family="Arial, sans-serif">
  <!-- Arduino Uno R3 - realistic illustration style -->

  <!-- PCB Board - blue -->
  <rect x="30" y="10" width="430" height="340" rx="10" fill="#2874A6" stroke="#1B4F72" stroke-width="3"/>

  <!-- 4 lỗ bắt vít (vàng nhạt) -->
  <circle cx="52" cy="32" r="8" fill="#F7DC6F" stroke="#D4AC0D" stroke-width="1.5"/>
  <circle cx="438" cy="32" r="8" fill="#F7DC6F" stroke="#D4AC0D" stroke-width="1.5"/>
  <circle cx="52" cy="320" r="8" fill="#F7DC6F" stroke="#D4AC0D" stroke-width="1.5"/>
  <circle cx="438" cy="320" r="8" fill="#F7DC6F" stroke="#D4AC0D" stroke-width="1.5"/>

  <!-- ===== USB Type-B (trái trên) ===== -->
  <rect x="15" y="70" width="50" height="45" rx="4" fill="#ccc" stroke="#999" stroke-width="2"/>
  <rect x="22" y="77" width="36" height="31" rx="2" fill="#aaa" stroke="#888" stroke-width="1"/>

  <!-- ===== RESET button (trái trên, đỏ) ===== -->
  <rect x="55" y="25" width="22" height="18" rx="3" fill="#888" stroke="#666" stroke-width="1.5"/>
  <circle cx="66" cy="34" r="7" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>

  <!-- ===== DC Power Jack (trái dưới) ===== -->
  <rect x="15" y="230" width="42" height="32" rx="5" fill="#333" stroke="#222" stroke-width="2"/>
  <circle cx="36" cy="246" r="8" fill="#222" stroke="#444" stroke-width="1"/>

  <!-- ===== DIGITAL PINS header (top) ===== -->
  <rect x="100" y="18" width="330" height="16" rx="2" fill="#1B4F72"/>
  <text x="265" y="50" text-anchor="middle" font-size="9" fill="#D6EAF8" font-weight="bold">DIGITAL (PWM ~)</text>

  <!-- Digital pin holes - top row -->
  <g>
    <rect x="102" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="107" y="16" text-anchor="middle" font-size="6.5" fill="#D6EAF8" font-weight="bold">AREF</text>
    <rect x="117" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="122" y="16" text-anchor="middle" font-size="6.5" fill="#D6EAF8" font-weight="bold">GND</text>
    <rect x="138" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="143" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">13</text>
    <rect x="155" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="160" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">12</text>
    <rect x="172" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="177" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~11</text>
    <rect x="189" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="194" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~10</text>
    <rect x="210" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="215" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~9</text>
    <rect x="227" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="232" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">8</text>
    <rect x="255" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="260" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">7</text>
    <rect x="272" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="277" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~6</text>
    <rect x="289" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="294" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~5</text>
    <rect x="306" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="311" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">4</text>
    <rect x="323" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="328" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">~3</text>
    <rect x="340" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="345" y="16" text-anchor="middle" font-size="7" fill="#F0B27A" font-weight="bold">2</text>
    <rect x="375" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="380" y="16" text-anchor="middle" font-size="6.5" fill="#D6EAF8" font-weight="bold">TX→1</text>
    <rect x="395" y="19" width="11" height="14" rx="1.5" fill="#111"/><text x="400" y="16" text-anchor="middle" font-size="6.5" fill="#D6EAF8" font-weight="bold">RX←0</text>
  </g>

  <!-- ===== Arduino Logo ===== -->
  <g transform="translate(290, 100)">
    <!-- Infinity symbol -->
    <circle cx="-18" cy="0" r="22" fill="none" stroke="white" stroke-width="5"/>
    <circle cx="18" cy="0" r="22" fill="none" stroke="white" stroke-width="5"/>
    <!-- Minus in left circle -->
    <line x1="-28" y1="0" x2="-8" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Plus in right circle -->
    <line x1="8" y1="0" x2="28" y2="0" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="-10" x2="18" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Cover overlap with board color -->
    <rect x="-5" y="-25" width="10" height="50" fill="#2874A6"/>
  </g>

  <!-- ===== LEDs ===== -->
  <!-- L LED (2 small rects) -->
  <text x="148" y="72" font-size="8" fill="#D6EAF8" font-weight="bold">L</text>
  <rect x="160" y="66" width="8" height="5" rx="1" fill="#E74C3C"/>
  <rect x="170" y="66" width="8" height="5" rx="1" fill="#27AE60"/>
  <!-- TX LED -->
  <text x="148" y="92" font-size="8" fill="#D6EAF8" font-weight="bold">TX</text>
  <rect x="168" y="86" width="8" height="5" rx="1" fill="#E74C3C"/>
  <!-- RX LED -->
  <text x="148" y="106" font-size="8" fill="#D6EAF8" font-weight="bold">RX</text>
  <rect x="168" y="100" width="8" height="5" rx="1" fill="#27AE60"/>
  <!-- ON LED (right side) -->
  <rect x="400" y="100" width="8" height="5" rx="1" fill="#E74C3C"/>
  <rect x="410" y="100" width="8" height="5" rx="1" fill="#27AE60"/>
  <text x="422" y="106" font-size="8" fill="#D6EAF8" font-weight="bold">ON</text>

  <!-- ===== ATmega16U2 (small QFP chip) ===== -->
  <rect x="110" y="110" width="30" height="30" rx="2" fill="#222" stroke="#111" stroke-width="1.5"/>
  <!-- Small pins around -->
  <rect x="108" y="115" width="3" height="3" fill="#999"/>
  <rect x="108" y="122" width="3" height="3" fill="#999"/>
  <rect x="108" y="129" width="3" height="3" fill="#999"/>
  <rect x="139" y="115" width="3" height="3" fill="#999"/>
  <rect x="139" y="122" width="3" height="3" fill="#999"/>
  <rect x="139" y="129" width="3" height="3" fill="#999"/>

  <!-- ===== Crystal oscillator (oval, silver) ===== -->
  <ellipse cx="120" cy="170" rx="20" ry="8" fill="#bbb" stroke="#999" stroke-width="1.5"/>

  <!-- ===== SMD components scattered ===== -->
  <rect x="90" y="80" width="6" height="10" rx="1" fill="#222"/>
  <rect x="100" y="80" width="6" height="10" rx="1" fill="#222"/>
  <rect x="185" y="75" width="5" height="8" rx="1" fill="#222"/>
  <rect x="195" y="75" width="5" height="8" rx="1" fill="#F1C40F"/>
  <rect x="90" y="155" width="8" height="5" rx="1" fill="#222"/>
  <rect x="145" y="155" width="5" height="8" rx="1" fill="#222"/>
  <rect x="395" y="130" width="5" height="10" rx="1" fill="#222"/>
  <rect x="395" y="145" width="5" height="10" rx="1" fill="#222"/>
  <!-- Green component near USB -->
  <rect x="75" y="130" width="8" height="8" rx="1" fill="#27AE60" stroke="#1E8449" stroke-width="1"/>

  <!-- ===== ICSP header (right) ===== -->
  <rect x="410" y="140" width="20" height="16" rx="2" fill="#222"/>
  <circle cx="416" cy="148" r="2" fill="#F0B27A"/>
  <circle cx="424" cy="148" r="2" fill="#F0B27A"/>
  <circle cx="416" cy="154" r="2" fill="#F0B27A"/>
  <circle cx="424" cy="154" r="2" fill="#F0B27A"/>
  <text x="420" y="138" text-anchor="middle" font-size="6" fill="#D6EAF8">ICSP</text>

  <!-- ===== ATmega328P (large DIP chip) ===== -->
  <rect x="230" y="195" width="185" height="50" rx="3" fill="#222" stroke="#111" stroke-width="2"/>
  <!-- Notch -->
  <circle cx="235" cy="220" r="5" fill="#333"/>
  <!-- Pins left -->
  <rect x="230" y="200" width="3" height="4" fill="#999"/><rect x="230" y="207" width="3" height="4" fill="#999"/>
  <rect x="230" y="214" width="3" height="4" fill="#999"/><rect x="230" y="221" width="3" height="4" fill="#999"/>
  <rect x="230" y="228" width="3" height="4" fill="#999"/><rect x="230" y="235" width="3" height="4" fill="#999"/>
  <!-- Pins right -->
  <rect x="412" y="200" width="3" height="4" fill="#999"/><rect x="412" y="207" width="3" height="4" fill="#999"/>
  <rect x="412" y="214" width="3" height="4" fill="#999"/><rect x="412" y="221" width="3" height="4" fill="#999"/>
  <rect x="412" y="228" width="3" height="4" fill="#999"/><rect x="412" y="235" width="3" height="4" fill="#999"/>

  <!-- ===== Ceramic resonators (2 circles, bottom left) ===== -->
  <circle cx="120" cy="280" r="16" fill="#ddd" stroke="#bbb" stroke-width="2"/>
  <ellipse cx="120" cy="284" rx="10" ry="6" fill="#333"/>
  <circle cx="155" cy="280" r="16" fill="#ddd" stroke="#bbb" stroke-width="2"/>
  <ellipse cx="155" cy="284" rx="10" ry="6" fill="#333"/>

  <!-- ===== POWER PINS (bottom) ===== -->
  <rect x="195" y="330" width="130" height="16" rx="2" fill="#1B4F72"/>
  <text x="260" y="328" text-anchor="middle" font-size="8" fill="#D6EAF8" font-weight="bold">POWER</text>
  <rect x="197" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="202" y="355" text-anchor="middle" font-size="6" fill="#D6EAF8">IOREF</text>
  <rect x="212" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="217" y="355" text-anchor="middle" font-size="6" fill="#D6EAF8">RST</text>
  <rect x="227" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="232" y="355" text-anchor="middle" font-size="6" fill="#F0B27A" font-weight="bold">3.3V</text>
  <rect x="242" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="247" y="355" text-anchor="middle" font-size="6" fill="#E74C3C" font-weight="bold">5V</text>
  <rect x="257" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="262" y="355" text-anchor="middle" font-size="6" fill="#D6EAF8" font-weight="bold">GND</text>
  <rect x="272" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="277" y="355" text-anchor="middle" font-size="6" fill="#D6EAF8" font-weight="bold">GND</text>
  <rect x="287" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="292" y="355" text-anchor="middle" font-size="6" fill="#D6EAF8">Vin</text>

  <!-- ===== ANALOG PINS (bottom right) ===== -->
  <rect x="340" y="330" width="100" height="16" rx="2" fill="#1B4F72"/>
  <text x="390" y="328" text-anchor="middle" font-size="8" fill="#D6EAF8" font-weight="bold">ANALOG IN</text>
  <rect x="342" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="347" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A0</text>
  <rect x="357" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="362" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A1</text>
  <rect x="372" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="377" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A2</text>
  <rect x="387" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="392" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A3</text>
  <rect x="402" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="407" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A4</text>
  <rect x="417" y="331" width="11" height="14" rx="1.5" fill="#111"/><text x="422" y="355" text-anchor="middle" font-size="6.5" fill="#27AE60" font-weight="bold">A5</text>
</svg>