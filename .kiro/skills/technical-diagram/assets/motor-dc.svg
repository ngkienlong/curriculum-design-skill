<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 140" font-family="Arial, sans-serif">
  <!-- Motor DC - realistic side view -->

  <!-- ===== Thân motor (hình trụ xám) ===== -->
  <!-- Mặt sau (tròn nhẹ) -->
  <rect x="80" y="18" width="120" height="100" rx="8" fill="#777" stroke="#555" stroke-width="2"/>
  <!-- Highlight trên thân -->
  <rect x="85" y="22" width="110" height="30" rx="6" fill="#888" opacity="0.5"/>
  <!-- Đường rãnh dọc trên thân -->
  <line x1="155" y1="22" x2="155" y2="115" stroke="#555" stroke-width="2.5"/>
  <line x1="175" y1="22" x2="175" y2="115" stroke="#555" stroke-width="2.5"/>

  <!-- Mặt trước motor (cap phải) -->
  <rect x="190" y="25" width="18" height="88" rx="6" fill="#666" stroke="#555" stroke-width="1.5"/>
  <!-- Rãnh trên cap -->
  <line x1="195" y1="40" x2="195" y2="50" stroke="#444" stroke-width="2"/>
  <line x1="195" y1="85" x2="195" y2="95" stroke="#444" stroke-width="2"/>

  <!-- ===== Trục motor (shaft) ===== -->
  <rect x="208" y="62" width="28" height="8" rx="2" fill="#aaa" stroke="#888" stroke-width="1"/>

  <!-- ===== Tấm vàng (end cap / brush plate) ===== -->
  <rect x="62" y="15" width="22" height="106" rx="2" fill="#E8E832" stroke="#C8C820" stroke-width="1.5"/>
  <!-- Tab nhỏ nhô ra -->
  <rect x="68" y="60" width="8" height="16" rx="1" fill="#aaa" stroke="#888" stroke-width="0.5"/>

  <!-- ===== Terminal tabs (mấu hàn dây) ===== -->
  <!-- Tab trên -->
  <rect x="55" y="30" width="12" height="10" rx="1.5" fill="#C8956A" stroke="#A07050" stroke-width="1"/>
  <circle cx="61" cy="35" r="2" fill="#ddd"/>
  <!-- Tab dưới -->
  <rect x="55" y="92" width="12" height="10" rx="1.5" fill="#C8956A" stroke="#A07050" stroke-width="1"/>
  <circle cx="61" cy="97" r="2" fill="#ddd"/>

  <!-- ===== Dây nối (2 dây cong) ===== -->
  <!-- Dây xanh lá (trên) -->
  <path d="M 55 35 Q 30 25 10 40" fill="none" stroke="#27AE60" stroke-width="4" stroke-linecap="round"/>
  <!-- Dây cam/vàng (dưới) -->
  <path d="M 55 97 Q 30 110 10 100" fill="none" stroke="#F39C12" stroke-width="4" stroke-linecap="round"/>

  <!-- Nhãn -->
  <text x="120" y="138" text-anchor="middle" font-size="9" fill="#555">Đảo dây = đảo chiều quay</text>
</svg>