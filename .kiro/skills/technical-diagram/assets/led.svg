<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 140" font-family="Arial, sans-serif">
  <!-- LED component - reusable, realistic style -->
  
  <!-- Thân LED: hình dome (nửa tròn trên + hình chữ nhật dưới) -->
  <!-- Phần dome trong suốt -->
  <path d="M 18 70 L 18 40 Q 18 8 40 8 Q 62 8 62 40 L 62 70 Z" 
        fill="#2ecc71" stroke="#1a8a4a" stroke-width="2.5" opacity="0.85"/>
  <!-- Highlight phản chiếu ánh sáng -->
  <path d="M 25 45 Q 25 18 38 18 Q 42 18 44 22" 
        fill="none" stroke="white" stroke-width="3" opacity="0.35" stroke-linecap="round"/>
  
  <!-- Đế LED (rim) -->
  <rect x="14" y="68" width="52" height="10" rx="2" fill="#27ae60" stroke="#1a8a4a" stroke-width="2"/>
  
  <!-- Cấu trúc bên trong (anvil + post) -->
  <!-- Anvil (cathode plate - bên phải, lớn hơn) -->
  <rect x="38" y="45" width="14" height="22" rx="1" fill="#1a8a4a" opacity="0.5"/>
  <!-- Post (anode wire - bên trái, nhỏ hơn) -->
  <rect x="26" y="50" width="6" height="18" rx="1" fill="#1a8a4a" opacity="0.5"/>
  <!-- Bonding wire -->
  <path d="M 32 52 Q 36 42 42 48" fill="none" stroke="#1a8a4a" stroke-width="1.5" opacity="0.4"/>

  <!-- Chân dài (+) Anode - bên trái -->
  <rect x="27" y="78" width="6" height="40" rx="1.5" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="30" y="130" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="bold">+ (dài)</text>

  <!-- Chân ngắn (-) Cathode - bên phải -->
  <rect x="47" y="78" width="6" height="32" rx="1.5" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <text x="50" y="122" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">- (ngắn)</text>
</svg>