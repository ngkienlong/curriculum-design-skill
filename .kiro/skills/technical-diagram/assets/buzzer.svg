<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 90" font-family="Arial, sans-serif">
  <!-- Buzzer thụ động - reusable -->
  <!-- Thân buzzer -->
  <circle cx="35" cy="35" r="25" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <!-- Lỗ phát âm -->
  <circle cx="35" cy="35" r="8" fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Dấu + -->
  <text x="15" y="20" font-size="12" fill="#27ae60" font-weight="bold">+</text>
  <!-- Chân + (dài hơn) -->
  <line x1="28" y1="60" x2="28" y2="80" stroke="#bdc3c7" stroke-width="2.5"/>
  <text x="28" y="90" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="bold">+</text>
  <!-- Chân - -->
  <line x1="42" y1="60" x2="42" y2="75" stroke="#bdc3c7" stroke-width="2.5"/>
  <text x="42" y="85" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="bold">-</text>
</svg>